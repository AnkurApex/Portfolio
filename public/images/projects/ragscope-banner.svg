<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid overlay -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Right side: pipeline nodes diagram -->
  <!-- Node connections (lines first) -->
  <g opacity="0.35">
    <line x1="870" y1="80" x2="950" y2="130" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="870" y1="80" x2="870" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="950" y1="130" x2="870" y2="165" stroke="#34d399" stroke-width="1.5"/>
    <line x1="950" y1="130" x2="1020" y2="100" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="1020" y1="100" x2="1070" y2="165" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="870" y1="165" x2="1020" y2="215" stroke="#34d399" stroke-width="1.5"/>
    <line x1="1070" y1="165" x2="1020" y2="215" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="1020" y1="100" x2="1110" y2="80" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="1110" y1="80" x2="1070" y2="165" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <!-- Nodes -->
  <circle cx="870" cy="80" r="8" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5" filter="url(#subtleGlow)"/>
  <circle cx="950" cy="130" r="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#subtleGlow)"/>
  <circle cx="870" cy="165" r="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5" filter="url(#subtleGlow)"/>
  <circle cx="1020" cy="100" r="8" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5" filter="url(#subtleGlow)"/>
  <circle cx="1110" cy="80" r="8" fill="#2d1b69" stroke="#a78bfa" stroke-width="1.5" filter="url(#subtleGlow)"/>
  <circle cx="1070" cy="165" r="8" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5" filter="url(#subtleGlow)"/>
  <circle cx="1020" cy="215" r="8" fill="#064e3b" stroke="#34d399" stroke-width="1.5" filter="url(#subtleGlow)"/>

  <!-- Left side: microscope / scope icon (stylized) -->
  <g transform="translate(60, 90)" opacity="0.9" filter="url(#glow)">
    <!-- Scope lens circle -->
    <circle cx="40" cy="40" r="32" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="20" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <!-- Crosshair lines -->
    <line x1="40" y1="8" x2="40" y2="22" stroke="#60a5fa" stroke-width="2"/>
    <line x1="40" y1="58" x2="40" y2="72" stroke="#60a5fa" stroke-width="2"/>
    <line x1="8" y1="40" x2="22" y2="40" stroke="#60a5fa" stroke-width="2"/>
    <line x1="58" y1="40" x2="72" y2="40" stroke="#60a5fa" stroke-width="2"/>
    <!-- Inner dot -->
    <circle cx="40" cy="40" r="4" fill="#60a5fa"/>
    <!-- Handle -->
    <line x1="65" y1="65" x2="90" y2="90" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="85" x2="115" y2="115" stroke="#a78bfa" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Main title: RAGScope -->
  <text
    x="190" y="145"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-2"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >RAGScope</text>

  <!-- Divider line under title -->
  <line x1="190" y1="162" x2="620" y2="162" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Subtitle -->
  <text
    x="190" y="190"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    letter-spacing="3"
    fill="#94a3b8"
  >PRODUCTION-GRADE RAG OBSERVABILITY PLATFORM</text>

  <!-- Tag badges row -->
  <!-- FastAPI badge -->
  <rect x="190" y="215" width="80" height="24" rx="4" fill="#052e2e" stroke="#34d399" stroke-width="1" opacity="0.8"/>
  <text x="230" y="231" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#34d399">FastAPI</text>

  <!-- Next.js badge -->
  <rect x="280" y="215" width="80" height="24" rx="4" fill="#0f0f0f" stroke="#e2e8f0" stroke-width="1" opacity="0.8"/>
  <text x="320" y="231" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#e2e8f0">Next.js 15</text>

  <!-- Gemini badge -->
  <rect x="370" y="215" width="90" height="24" rx="4" fill="#0f1a3d" stroke="#60a5fa" stroke-width="1" opacity="0.8"/>
  <text x="415" y="231" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#60a5fa">Gemini AI</text>

  <!-- ChromaDB badge -->
  <rect x="470" y="215" width="90" height="24" rx="4" fill="#2d1a00" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
  <text x="515" y="231" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#f59e0b">ChromaDB</text>

  <!-- Docker badge -->
  <rect x="570" y="215" width="70" height="24" rx="4" fill="#0a1f3d" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="605" y="231" text-anchor="middle" font-family="'Segoe UI', monospace" font-size="10" font-weight="600" fill="#3b82f6">Docker</text>

  <!-- Bottom glow line -->
  <line x1="0" y1="299" x2="1200" y2="299" stroke="url(#textGrad)" stroke-width="1" opacity="0.3"/>
</svg>
